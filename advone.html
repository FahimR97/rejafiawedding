<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advone — Rejaul &amp; Afia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ivory:    #faf6ee;
      --parchment:#f4ead8;
      --gold:     #b8913a;
      --gold-08:  rgba(184,145,58,0.08);
      --gold-20:  rgba(184,145,58,0.20);
      --gold-40:  rgba(184,145,58,0.40);
      --ink:      #1c140a;
      --ink-30:   rgba(28,20,10,0.30);
      --serif:    'Cormorant Garamond', Georgia, serif;
      --sans:     'Inter', system-ui, sans-serif;
      --ease-film:cubic-bezier(0.16,1,0.30,1);
      --ease-soft:cubic-bezier(0.45,0,0.55,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--ivory); color: var(--ink); font-family: var(--sans); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    img, video { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }
    ::selection { background: var(--gold-08); }

    /* ── NAV ── */
    #nav {
      position: fixed; inset: 0 0 auto 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 1.5rem;
      background: rgba(250,246,238,0.92);
      backdrop-filter: blur(22px) saturate(1.5);
      -webkit-backdrop-filter: blur(22px) saturate(1.5);
      border-bottom: 1px solid rgba(184,145,58,0.10);
    }
    .nav-logo { font-family: var(--serif); font-style: italic; font-size: 1.3rem; letter-spacing: 0.06em; }
    .nav-logo em { color: var(--gold); }
    .nav-back { font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ink-30); transition: color 0.3s; }
    .nav-back:hover { color: var(--gold); }

    /* ── HERO ── */
    .page-hero {
      min-height: 38vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--parchment);
      padding: 5.5rem 1.5rem 2.5rem;
      text-align: center;
    }
    .page-hero h1 {
      font-family: var(--serif); font-style: italic; font-weight: 400;
      font-size: clamp(3rem, 8vw, 5.5rem);
      letter-spacing: 0.04em; color: var(--ink);
    }
    .page-hero-rule { width: 48px; height: 1px; background: var(--gold); margin: 1.2rem auto 0; opacity: 0.5; }
    .page-hero-sub {
      margin-top: 1rem;
      font-size: 0.56rem; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--ink-30);
    }

    /* ── GALLERY ── */
    .gallery-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1rem 4rem;
    }

    .section-label {
      font-size: 0.56rem; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--ink-30); margin-bottom: 1rem; margin-top: 2.5rem;
    }
    .section-label:first-child { margin-top: 0; }

    /* ── Photo masonry ── */
    .photo-grid { column-count: 3; column-gap: 10px; margin-bottom: 0.5rem; }
    @media (max-width: 860px) { .photo-grid { column-count: 2; } }

    .photo-card {
      break-inside: avoid; position: relative; overflow: hidden;
      margin-bottom: 10px; cursor: pointer;
      background: var(--parchment); border-radius: 3px;
    }
    .photo-card img { width: 100%; height: auto; display: block; transition: transform 0.7s var(--ease-film); }
    .photo-card:hover img { transform: scale(1.03); }
    .pc-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(28,20,10,0.55) 0%, transparent 55%);
      opacity: 0; transition: opacity 0.4s var(--ease-soft); z-index: 2;
    }
    .photo-card:hover .pc-overlay { opacity: 1; }
    .pc-dl {
      position: absolute; bottom: 0.7rem; right: 0.7rem; z-index: 4;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(184,145,58,0.80);
      display: flex; align-items: center; justify-content: center;
      color: #fff; opacity: 0;
      transition: opacity 0.35s var(--ease-film), background 0.3s, transform 0.3s;
    }
    .photo-card:hover .pc-dl { opacity: 1; }
    .pc-dl:hover { background: var(--gold); transform: scale(1.1); }
    .pc-dl svg { width: 12px; height: 12px; }
    @media (hover: none) { .pc-dl { opacity: 1; } }

    /* Mobile-first: 1 column */
    .video-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    /* Tablet: clean 2-column pairs */
    @media (min-width: 600px) {
      .video-grid { grid-template-columns: repeat(4, 1fr); }
      .video-card:nth-child(odd)  { grid-column: 1 / 3; }
      .video-card:nth-child(even) { grid-column: 3 / 5; }
    }

    /* Desktop: 3 columns, 2 even rows of 3 */
    @media (min-width: 960px) {
      .video-grid { grid-template-columns: repeat(6, 1fr); gap: 16px; }
      .video-card:nth-child(1), .video-card:nth-child(4) { grid-column: 1 / 3; }
      .video-card:nth-child(2), .video-card:nth-child(5) { grid-column: 3 / 5; }
      .video-card:nth-child(3), .video-card:nth-child(6) { grid-column: 5 / 7; }
    }

    /* ── CARD ── */
    .video-card {
      position: relative;
      overflow: hidden;
      aspect-ratio: 9 / 16;
      cursor: pointer;
      background: var(--parchment);
      border-radius: 3px;
    }

    .video-card img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.7s var(--ease-film);
    }
    .video-card:hover img { transform: scale(1.04); }

    /* Always-on gradient for readability */
    .vc-overlay {
      position: absolute; inset: 0; z-index: 2;
      background: linear-gradient(
        to top,
        rgba(28,20,10,0.72) 0%,
        rgba(28,20,10,0.12) 45%,
        transparent 68%
      );
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 1.1rem 1rem 1rem;
      transition: background 0.45s var(--ease-soft);
    }
    .video-card:hover .vc-overlay {
      background: linear-gradient(
        to top,
        rgba(28,20,10,0.82) 0%,
        rgba(28,20,10,0.24) 50%,
        transparent 72%
      );
    }

    /* Play button — centred, always visible */
    .play-btn {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(250,246,238,0.88);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(28,20,10,0.22);
      transition: transform 0.45s var(--ease-film), background 0.3s;
    }
    .video-card:hover .play-btn {
      transform: translate(-50%, -50%) scale(1.10);
      background: #fff;
    }
    .play-btn svg { width: 18px; height: 18px; margin-left: 3px; fill: var(--ink); }

    /* Caption */
    .vc-title {
      font-family: var(--serif); font-style: italic; font-weight: 400;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      color: rgba(250,246,238,0.95);
      line-height: 1.3;
      position: relative; z-index: 3;
    }

    /* Download link */
    .vc-dl {
      position: absolute; bottom: 0.7rem; right: 0.7rem; z-index: 4;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(184,145,58,0.80);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      opacity: 0;
      transition: opacity 0.35s var(--ease-film), background 0.3s, transform 0.35s var(--ease-film);
    }
    .video-card:hover .vc-dl { opacity: 1; }
    .vc-dl:hover { background: var(--gold); transform: scale(1.1); }
    .vc-dl svg { width: 12px; height: 12px; }

    /* Touch: always show overlay elements */
    @media (hover: none) {
      .vc-dl { opacity: 1; }
      .video-card img { transform: none !important; }
    }

    /* ── LIGHTBOX ── */
    #lb {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(10,6,3,0.97);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s var(--ease-soft);
    }
    #lb.open { opacity: 1; pointer-events: all; }
    #lb-in {
      opacity: 0; transform: scale(0.96);
      transition: opacity 0.5s var(--ease-film), transform 0.5s var(--ease-film);
    }
    #lb.open #lb-in { opacity: 1; transform: none; }
    #lb-in img {
      max-width: min(92vw, 700px);
      max-height: 88vh;
      border-radius: 3px;
      display: block;
    }
    #lb-in video {
      max-width: min(92vw, 420px);
      max-height: 88vh;
      background: #000;
      border-radius: 3px;
    }
    #lb-x {
      position: absolute; top: 1.25rem; right: 1.5rem;
      background: none; border: none;
      color: rgba(250,246,238,0.38); font-size: 1.8rem;
      cursor: pointer; transition: color 0.25s; z-index: 1001;
    }
    #lb-x:hover { color: rgba(250,246,238,0.9); }
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(250,246,238,0.08); border: none;
      color: rgba(250,246,238,0.5); font-size: 2.2rem;
      width: 46px; height: 46px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.3s, color 0.3s; z-index: 1001;
    }
    .lb-nav:hover { background: rgba(250,246,238,0.15); color: rgba(250,246,238,0.9); }
    .lb-prev { left: 1rem; }
    .lb-next { right: 1rem; }

    /* ── FOOTER ── */
    footer {
      background: linear-gradient(to bottom, #f3e4cc 0%, #f8edd8 40%, var(--ivory) 100%);
      border-top: 1px solid var(--gold-08);
      padding: 3.5rem 1.5rem; text-align: center;
    }
    .footer-names { font-family: var(--serif); font-style: italic; font-size: 1.65rem; color: var(--ink-30); letter-spacing: 0.07em; }
    .footer-names em { color: var(--gold); }
    .footer-date { font-size: 0.56rem; letter-spacing: 0.32em; text-transform: uppercase; color: var(--gold-40); margin-top: 0.55rem; }

    /* ── PETALS ── */
    #petals { position: fixed; inset: 0; z-index: 9996; pointer-events: none; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      #petals { display: none !important; }
    }
    #curtain { position: fixed; inset: 0; background: var(--ivory); z-index: 9999; pointer-events: none; opacity: 1; transition: opacity .55s cubic-bezier(.16,1,.30,1); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
</head>
<body>
  <div id="curtain"></div>
  <canvas id="petals" aria-hidden="true"></canvas>

  <nav id="nav">
    <a href="index.html" class="nav-logo">R <em>&amp;</em> A</a>
    <a href="index.html" class="nav-back">← Home</a>
  </nav>

  <header class="page-hero">
    <h1>Advone</h1>
    <div class="page-hero-rule"></div>
    <p class="page-hero-sub">21 photos &nbsp;·&nbsp; 6 films</p>
  </header>

  <div class="gallery-wrap">
    <p class="section-label">Photos</p>
    <div class="photo-grid" id="pg"></div>
    <p class="section-label">Films</p>
    <div class="video-grid" id="vg"></div>
  </div>

  <footer>
    <a href="index.html" class="footer-names">Rejaul <em>&amp;</em> Afia</a>
    <p class="footer-date">3rd May 2026</p>
  </footer>

  <div id="lb" role="dialog" aria-modal="true" aria-label="Video viewer">
    <button id="lb-x" aria-label="Close">&times;</button>
    <button id="lb-prev" class="lb-nav lb-prev" aria-label="Previous">&#8249;</button>
    <button id="lb-next" class="lb-nav lb-next" aria-label="Next">&#8250;</button>
    <div id="lb-in"></div>
  </div>

  <script>
  const BASE = 'https://pub-1bab4a8b6280486dbe1ad8b1512bcbda.r2.dev'

  const PHOTOS = [
    '0001','0002','0003','0004','0005','0006','0007','0008','0009','0010',
    '0011','0012','0013','0014','0015','0016','0017','0018','0019','0020','0021'
  ]

  const VIDEOS = [
    { n:'0001', title:'A message for Afia' },
    { n:'0002', title:'A&R Ceremony' },
    { n:'0003', title:'Arrival moments' },
    { n:'0004', title:'Bentley moments' },
    { n:'0005', title:'Family moments' },
    { n:'0006', title:'To the Bride and Groom' },
  ]

  const dlSvg = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v8M5 7l3 3 3-3M2 12v2h12v-2"/></svg>`

  // ── Render photos ─────────────────────────────────────────────────────
  document.getElementById('pg').innerHTML = PHOTOS.map(n => `
    <div class="photo-card" data-src="${BASE}/advone/photos/${n}.jpg" data-type="photo">
      <img src="${BASE}/advone/photo-thumbs/${n}.jpg" alt="" loading="lazy"
           onload="this.style.opacity=1" style="opacity:0;transition:opacity 0.5s">
      <div class="pc-overlay"></div>
      <a href="${BASE}/advone/photos/${n}.jpg" download class="pc-dl"
         onclick="event.stopPropagation()" title="Download">${dlSvg}</a>
    </div>
  `).join('')

  // ── Render videos ─────────────────────────────────────────────────────
  document.getElementById('vg').innerHTML = VIDEOS.map(v => `
    <div class="video-card" data-src="${BASE}/advone/videos/${v.n}.mp4" data-type="video">
      <img src="${BASE}/advone/thumbs/${v.n}.jpg" alt="${v.title}" loading="lazy">
      <div class="vc-overlay">
        <p class="vc-title">${v.title}</p>
      </div>
      <div class="play-btn" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <a href="${BASE}/advone/videos/${v.n}.mp4" download class="vc-dl"
         onclick="event.stopPropagation()" title="Download">${dlSvg}</a>
    </div>
  `).join('')

  // ── Lightbox (photos + videos) ────────────────────────────────────────
  ;(function() {
    const lb  = document.getElementById('lb')
    const inn = document.getElementById('lb-in')
    const cls = document.getElementById('lb-x')
    const prv = document.getElementById('lb-prev')
    const nxt = document.getElementById('lb-next')
    let cards = [], idx = 0

    function show(i) {
      idx = i
      const card = cards[idx]
      inn.innerHTML = ''
      if (card.dataset.type === 'photo') {
        const img = document.createElement('img')
        img.src = card.dataset.src
        inn.appendChild(img)
      } else {
        const v = document.createElement('video')
        v.src = card.dataset.src
        v.controls = v.playsInline = true
        v.preload = 'metadata'
        inn.appendChild(v)
      }
      prv.style.display = idx > 0 ? '' : 'none'
      nxt.style.display = idx < cards.length - 1 ? '' : 'none'
    }

    function open(i) { show(i); lb.classList.add('open'); document.body.style.overflow = 'hidden' }
    function close() {
      lb.classList.remove('open'); document.body.style.overflow = ''
      setTimeout(() => { const v = inn.querySelector('video'); if (v) v.pause(); inn.innerHTML = '' }, 420)
    }

    // Collect all cards after render
    cards = Array.from(document.querySelectorAll('.photo-card, .video-card'))
    cards.forEach((card, i) => {
      card.addEventListener('click', e => { if (!e.target.closest('.vc-dl, .pc-dl')) open(i) })
    })
    prv.addEventListener('click', () => { if (idx > 0) show(idx - 1) })
    nxt.addEventListener('click', () => { if (idx < cards.length - 1) show(idx + 1) })
    lb.addEventListener('click', e => { if (e.target === lb) close() })
    cls.addEventListener('click', close)
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return
      if (e.key === 'Escape') close()
      if (e.key === 'ArrowLeft' && idx > 0) show(idx - 1)
      if (e.key === 'ArrowRight' && idx < cards.length - 1) show(idx + 1)
    })
  })()

  // ── GSAP scroll entrance ──────────────────────────────────────────────
  gsap.registerPlugin(ScrollTrigger)
  window.addEventListener('load', () => {
    ScrollTrigger.batch('.photo-card, .video-card', {
      start: 'top 92%',
      onEnter: b => gsap.fromTo(b,
        { y: 28, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.75, stagger: 0.08, ease: 'power2.out', overwrite: true }
      ),
      once: true
    })
  })

  // ── Petals ────────────────────────────────────────────────────────────
  ;(function() {
    const cv = document.getElementById('petals')
    if (!cv) return
    const ctx = cv.getContext('2d')
    let W, H, pool = [], lastY = 0, frame = 0, mx = -9999, my = -9999

    function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight }

    function make() {
      return {
        x: Math.random() * W, y: -16,
        vx: (Math.random() - 0.5) * 0.4, vy: Math.random() * 0.55 + 0.3,
        rot: Math.random() * Math.PI * 2, vrot: (Math.random() - 0.5) * 0.012,
        w: Math.random() * 5 + 4, h: Math.random() * 9 + 7,
        alpha: Math.random() * 0.16 + 0.20,
        sway: Math.random() * Math.PI * 2,
        swayS: Math.random() * 0.007 + 0.003,
        swayA: Math.random() * 0.18 + 0.05,
        phase: Math.random() * Math.PI * 2,
        swayA2: Math.random() * 0.08 + 0.02
      }
    }

    function draw(p) {
      ctx.save()
      ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.globalAlpha = p.alpha
      ctx.beginPath()
      ctx.moveTo(0, -p.h)
      ctx.bezierCurveTo(p.w, -p.h * 0.5, p.w * 0.8, p.h * 0.3, 0, p.h)
      ctx.bezierCurveTo(-p.w * 0.8, p.h * 0.3, -p.w, -p.h * 0.5, 0, -p.h)
      const g = ctx.createLinearGradient(0, -p.h, 0, p.h)
      g.addColorStop(0,   'rgba(255,182,210,0.62)')
      g.addColorStop(0.5, 'rgba(248,140,185,0.46)')
      g.addColorStop(1,   'rgba(225,95,155,0.28)')
      ctx.fillStyle = g; ctx.fill(); ctx.restore()
    }

    function tick() {
      ctx.clearRect(0, 0, W, H)
      frame++
      if (frame % 120 === 0 && pool.length < 12) pool.push(make())
      for (let i = pool.length - 1; i >= 0; i--) {
        const p = pool[i]
        const rdx = p.x - mx, rdy = p.y - my, rd2 = rdx * rdx + rdy * rdy
        if (rd2 < 100 * 100 && rd2 > 0) {
          const rd = Math.sqrt(rd2), f = (100 - rd) / 100 * 1.1
          p.vx += (rdx / rd) * f; p.vy += (rdy / rd) * f
        }
        p.vx *= 0.92; p.vy = Math.min(Math.max(p.vy, 0.25), 6)
        p.sway += p.swayS
        p.x += p.vx + Math.sin(p.sway) * p.swayA + Math.sin(p.sway * 1.7 + p.phase) * p.swayA2
        p.y += p.vy; p.rot += p.vrot
        if (p.y > H * 0.75) p.alpha -= 0.006
        if (p.y > H + 20 || p.alpha <= 0) { pool.splice(i, 1); continue }
        draw(p)
      }
      requestAnimationFrame(tick)
    }

    window.addEventListener('scroll', () => {
      const sy = window.scrollY, vel = Math.abs(sy - lastY); lastY = sy
      if (sy < window.innerHeight * 0.5 || pool.length >= 16 || vel < 8) return
      pool.push(make())
    }, { passive: true })
    window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY }, { passive: true })
    window.addEventListener('resize', resize)
    resize()
    // Seed a handful of petals spread across the viewport on load
    for (let i = 0; i < 8; i++) {
      const p = make()
      p.y = Math.random() * H * 0.7  // already in-frame
      pool.push(p)
    }
    tick()
  })()
  ;(function(){const c=document.getElementById('curtain');if(!c)return;requestAnimationFrame(()=>requestAnimationFrame(()=>{c.style.opacity='0'}));document.addEventListener('click',function(e){const a=e.target.closest('a[href]');if(!a)return;const h=a.getAttribute('href');if(!h||h[0]==='#'||h.includes('://')||h.startsWith('mailto'))return;e.preventDefault();c.style.opacity='1';c.style.pointerEvents='all';setTimeout(()=>{location.href=h},560)})})()
  </script>
</body>
</html>
