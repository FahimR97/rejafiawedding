<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejaul & Afia — Wedding Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf8f5;
      --bg-dark: #1a1a18;
      --text: #1a1a18;
      --text-light: rgba(26,26,24,0.5);
      --gold: #c4a265;
      --gold-light: rgba(196,162,101,0.12);
      --overlay: rgba(26,26,24,0.85);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    img, video { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }
    ::selection { background: var(--gold-light); color: var(--text); }

    /* ── NAV ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 2.5rem;
      transform: translateY(-100%);
      transition: transform 0.6s cubic-bezier(0.23,1,0.32,1), background 0.4s ease, backdrop-filter 0.4s ease;
    }
    .nav--visible { transform: translateY(0); }
    .nav--scrolled { background: rgba(250,248,245,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .nav__logo { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.15rem; font-weight: 400; letter-spacing: 0.04em; }
    .nav__logo .amp { color: var(--gold); }
    .nav__links { display: flex; gap: 2rem; }
    .nav__links a { font-family: 'Inter', sans-serif; font-size: 0.65rem; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; font-variant: small-caps; color: var(--text-light); transition: color 0.3s; }
    .nav__links a:hover { color: var(--text); }

    /* ── HERO ── */
    .hero { position: relative; width: 100%; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    #heroImage { position: absolute; inset: 0; }
    #heroImage img, #heroImage video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 1.6s ease; }
    .hero__overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(250,248,245,0.2) 0%, rgba(250,248,245,0.7) 100%); z-index: 1; }
    .hero__content { position: relative; z-index: 3; text-align: center; }
    .hero__mandala { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; opacity: 0.12; pointer-events: none; }
    .hero h1 { font-family: 'Playfair Display', serif; font-weight: 400; font-style: italic; font-size: clamp(3rem, 8vw, 7rem); line-height: 1.1; position: relative; }
    .hero h1 .amp { color: var(--gold); font-style: italic; }
    .hero-word { display: inline-block; opacity: 0; transform: translateY(30px); animation: heroFadeIn 1.2s cubic-bezier(0.23,1,0.32,1) forwards; animation-delay: var(--d); }
    .hero-date { font-family: 'Inter', sans-serif; font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-light); margin-top: 2rem; opacity: 0; transform: translateY(30px); animation: heroFadeIn 1.2s cubic-bezier(0.23,1,0.32,1) forwards; animation-delay: var(--d); }
    .hero-ctas { display: flex; gap: 1rem; justify-content: center; margin-top: 2.5rem; opacity: 0; transform: translateY(30px); animation: heroFadeIn 1.2s cubic-bezier(0.23,1,0.32,1) forwards; animation-delay: var(--d); }
    .hero-ctas a { font-family: 'Inter', sans-serif; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.85rem 2.2rem; transition: all 0.3s ease; }
    .btn--gallery { border: 1px solid var(--text); color: var(--text); }
    .btn--gallery:hover { background: var(--text); color: var(--bg); }
    .btn--download-hero { border: 1px solid var(--gold); color: var(--gold); }
    .btn--download-hero:hover { background: var(--gold); color: var(--bg); }
    .scroll-indicator { position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%); width: 1px; height: 40px; z-index: 3; }
    .scroll-indicator::after { content: ''; display: block; width: 1px; height: 100%; background: var(--gold); animation: scrollLine 2.4s ease infinite; }

    @keyframes heroFadeIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes heroZoom { from { transform: scale(1.05); } to { transform: scale(1); } }
    @keyframes scrollLine {
      0% { transform: scaleY(0); transform-origin: top; opacity: 1; }
      50% { transform: scaleY(1); transform-origin: top; opacity: 1; }
      51% { transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; opacity: 0.3; }
    }

    /* ── GOLD THREAD ── */
    .gold-thread { position: fixed; left: 50%; top: 0; width: 1px; height: 100vh; background: var(--gold); opacity: 0.08; z-index: 1; pointer-events: none; }

    /* ── GALLERY ── */
    .gallery { padding: 8rem 0; background: var(--bg); }
    .creator-section { max-width: 1200px; margin: 0 auto; padding: 0 2rem; margin-bottom: 6rem; }
    .creator-header { text-align: center; margin-bottom: 3rem; }
    .creator-name { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(1.6rem, 3vw, 2.4rem); color: var(--text); font-weight: 400; }
    .creator-rule { width: 60px; height: 1px; background: var(--gold); margin: 1rem auto 0; opacity: 0.4; }
    .section-label { font-family: 'Inter', sans-serif; font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-light); text-align: center; margin: 3rem 0 1.5rem; }

    .photo-grid { column-count: 3; column-gap: 4px; }
    .photo-card { position: relative; overflow: hidden; cursor: pointer; border-radius: 2px; break-inside: avoid; margin-bottom: 4px; clip-path: inset(0); transition: clip-path 1s cubic-bezier(0.23,1,0.32,1); }
    .photo-card.reveal-ready { clip-path: inset(0 0 100% 0); }
    .photo-card.revealed { clip-path: inset(0 0 0 0); }
    .photo-card img { width: 100%; display: block; opacity: 0; transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.23,1,0.32,1); }
    .photo-card img.loaded { opacity: 1; }
    .photo-card:hover img.loaded { transform: scale(1.02); }
    .photo-card .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(26,26,24,0.6) 0%, transparent 50%); opacity: 0; transition: opacity 0.4s; }
    .photo-card:hover .card-overlay { opacity: 1; }
    .photo-card .card-caption { position: absolute; bottom: 1rem; left: 1rem; right: 1rem; font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.9rem; color: rgba(250,248,245,0.9); transform: translateY(8px); opacity: 0; transition: all 0.4s; }
    .photo-card:hover .card-caption { transform: translateY(0); opacity: 1; }

    .video-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
    .video-card { position: relative; overflow: hidden; cursor: pointer; aspect-ratio: 16/9; border-radius: 2px; background: #e8e4de; clip-path: inset(0); transition: clip-path 1s cubic-bezier(0.23,1,0.32,1); }
    .video-card.reveal-ready { clip-path: inset(0 0 100% 0); }
    .video-card.revealed { clip-path: inset(0 0 0 0); }
    .video-card img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.23,1,0.32,1); }
    .video-card img.loaded { opacity: 1; }
    .video-card:hover img.loaded { transform: scale(1.02); }
    .video-card .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 56px; height: 56px; border-radius: 50%; background: rgba(250,248,245,0.9); display: flex; align-items: center; justify-content: center; transition: transform 0.4s cubic-bezier(0.23,1,0.32,1); }
    .video-card:hover .play-btn { transform: translate(-50%,-50%) scale(1.1); }
    .play-btn svg { width: 18px; height: 18px; fill: var(--bg-dark); margin-left: 2px; }
    .video-card .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(26,26,24,0.5) 0%, transparent 40%); }
    .video-card .card-caption { position: absolute; bottom: 1rem; left: 1rem; right: 1rem; font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.9rem; color: rgba(250,248,245,0.9); }

    /* ── LIGHTBOX ── */
    .lightbox { position: fixed; inset: 0; background: var(--overlay); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox__inner { opacity: 0; transform: translateY(12px); transition: all 0.6s cubic-bezier(0.23,1,0.32,1) 0.1s; }
    .lightbox.open .lightbox__inner { opacity: 1; transform: translateY(0); }
    .lightbox__inner img { max-width: 92vw; max-height: 88vh; object-fit: contain; display: block; }
    .lightbox__inner video { max-width: 92vw; max-height: 88vh; display: block; background: #000; }
    .lightbox__close { position: absolute; top: 1.5rem; right: 1.5rem; width: 44px; height: 44px; border-radius: 50%; background: rgba(250,248,245,0.1); border: none; color: rgba(250,248,245,0.6); font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
    .lightbox__close:hover { background: rgba(250,248,245,0.2); color: #fff; }

    /* ── DOWNLOAD ── */
    .download { background: var(--bg); padding: 8rem 2rem; text-align: center; position: relative; overflow: hidden; border-top: 1px solid rgba(196,162,101,0.12); }
    .dl-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 600px; height: 400px; background: radial-gradient(ellipse, rgba(196,162,101,0.06) 0%, transparent 70%); pointer-events: none; }
    .download h2 { font-family: 'Playfair Display', serif; font-weight: 400; font-style: italic; font-size: clamp(2.2rem, 5vw, 4.5rem); color: var(--text); margin-bottom: 1rem; position: relative; }
    .download p { font-family: 'Inter', sans-serif; font-size: 0.75rem; letter-spacing: 0.15em; color: var(--text-light); margin-bottom: 3.5rem; position: relative; }
    .dl-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; position: relative; }
    .btn--dl { font-family: 'Inter', sans-serif; font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.85rem 2.5rem; border: 1px solid rgba(196,162,101,0.3); color: var(--text-light); background: transparent; cursor: pointer; transition: all 0.3s; border-radius: 0; }
    .btn--dl:hover { border-color: var(--gold); color: var(--gold); }
    .btn--dl-primary { border-color: var(--gold); color: var(--gold); animation: pulse 3s ease infinite; }
    .btn--dl-primary:hover { background: var(--gold); color: var(--bg); }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(196,162,101,0.2); }
      50% { box-shadow: 0 0 0 8px rgba(196,162,101,0); }
    }

    /* ── FOOTER ── */
    .footer { background: var(--bg); border-top: 1px solid rgba(196,162,101,0.12); padding: 3rem 2rem; text-align: center; }
    .footer-names { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.5rem; color: var(--text-light); }
    .footer-names .amp { color: var(--gold); }
    .footer-date { font-family: 'Inter', sans-serif; font-size: 0.58rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(196,162,101,0.5); margin-top: 0.5rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .photo-grid { column-count: 2; }
      .nav { padding: 1rem 1.5rem; }
      .creator-section { padding: 0 1rem; }
    }
    @media (max-width: 480px) {
      .photo-grid { column-count: 1; }
      .video-grid { grid-template-columns: 1fr; }
      .hero-ctas { flex-direction: column; align-items: center; }
      .dl-btns { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav id="nav" class="nav">
    <div class="nav__logo">R <span class="amp">&</span> A</div>
    <div class="nav__links">

  </nav>

  <!-- HERO -->
  <section id="hero" class="hero">

    <div class="hero__overlay"></div>
    <div id="heroContent" class="hero__content">

          </g>

            <ellipse cx="150" cy="25" rx="8" ry="22" transform="rotate(0,150,150)"/>

        <span class="hero-word" style="--d:0.3s">Rejaul</span><br>

// ─── FILTER HELPERS ───────────────────────────────────────────────────────────
const sahidPhotos = MEDIA_DATA.filter(m => m.creator === 'sahid' && m.type === 'photo');
const sahidVideos = MEDIA_DATA.filter(m => m.creator === 'sahid' && m.type === 'video');
const fahimPhotos = MEDIA_DATA.filter(m => m.creator === 'fahim' && m.type === 'photo');
const fahimVideos = MEDIA_DATA.filter(m => m.creator === 'fahim' && m.type === 'video');
const finnPhotos  = MEDIA_DATA.filter(m => m.creator === 'finn' && m.type === 'photo');
const finnVideos  = MEDIA_DATA.filter(m => m.creator === 'finn' && m.type === 'video');

const allVideos   = MEDIA_DATA.filter(m => m.type === 'video');

// ─── 1. NAV ───────────────────────────────────────────────────────────────────
;(() => {
  const nav  = document.getElementById('nav');
  const hero = document.getElementById('hero');
  if (!nav || !hero) return;
  new IntersectionObserver(entries => {
    const visible = !entries[0].isIntersecting;
    nav.classList.toggle('nav--visible', visible);
    nav.classList.toggle('nav--scrolled', visible);
  }, { threshold: 0.15 }).observe(hero);
})();

// ─── 2. HERO SLIDESHOW + PARALLAX ─────────────────────────────────────────────
;(() => {
  const container = document.getElementById('heroImage');
  const heroContent = document.getElementById('heroContent');
  if (!container || !MEDIA_DATA.length) return;

  const heroItems = [
    'hero.jpg',
    'hero-DSCF2707.jpg',
    'hero-DSCF2741.jpg',
    'hero-DSCF2910.jpg',
    'hero-DSCF3430.jpg',
  ];
  let current = 0;
  let currentEl = null;

  const kenBurns = [
    'scale(1.06) translate(1%, 0.5%)',
    'scale(1.05) translate(-1%, -0.5%)',
    'scale(1.07) translate(0.5%, -1%)',
  ];

  function show() {
    const src = heroItems[current % heroItems.length];
    let el;

    el = document.createElement('img');
    el.src = src;
    el.alt = '';
    const kb = kenBurns[current % kenBurns.length];
    el.style.cssText = `opacity:0; transform:${kb}; transition: opacity 1.6s ease, transform 8s ease;`;
    setTimeout(() => { el.style.opacity = '1'; el.style.transform = 'scale(1) translate(0,0)'; }, 50);

    container.appendChild(el);

    if (currentEl) {
      const prev = currentEl;
      prev.style.opacity = '0';
      setTimeout(() => prev.remove(), 1800);
    }
    currentEl = el;
    current++;
  }

  show();
  setInterval(show, 6000);

  // Parallax: fade hero content on scroll
  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    if (y > window.innerHeight) return;
    if (heroContent) {
      heroContent.style.opacity = Math.min(1, Math.max(0, 1 - (y / (window.innerHeight * 0.7))));
    }
  }, { passive: true });
})();

// ─── 3. GALLERY RENDER ───────────────────────────────────────────────────────
function renderGallery() {
  const container = document.getElementById('galleryContent');
  if (!container) return;

  const creators = [
    { name: 'Sahid', photos: sahidPhotos, videos: sahidVideos },
    { name: 'Finn', photos: finnPhotos, videos: finnVideos },
    { name: 'Fahim', photos: fahimPhotos, videos: fahimVideos },
  ];

  let html = '';
  creators.forEach(c => {
    html += `<div class="creator-section">`;
    html += `<div class="creator-header"><h2 class="creator-name">${c.name}</h2><div class="creator-rule"></div></div>`;

    if (c.photos.length) {
      html += `<p class="section-label">Photos</p>`;
      html += `<div class="photo-grid">`;
      c.photos.forEach((item, idx) => {
        html += `<div class="photo-card" data-src="${item.src}" data-type="photo" data-idx="${idx}">` +
          `<img src="${item.thumbnail}" alt="${item.caption}" loading="lazy" onload="this.classList.add('loaded')">` +
          `<div class="card-overlay"></div>` +
          `<p class="card-caption">${item.caption}</p>` +
          `</div>`;
      });
      html += `</div>`;
    }

    if (c.videos.length) {
      html += `<p class="section-label">Videos</p>`;
      html += `<div class="video-grid">`;
      c.videos.forEach((item, idx) => {
        html += `<div class="video-card" data-src="${item.src}" data-type="video" data-idx="${idx}">` +
          `<img src="${item.thumbnail}" alt="${item.caption}" loading="lazy" onload="this.classList.add('loaded')">` +
          `<div class="card-overlay"></div>` +
          `<div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>` +
          `<p class="card-caption">${item.caption}</p>` +
          `</div>`;
      });
      html += `</div>`;
    }

    html += `</div>`;
  });

  container.innerHTML = html;
}

// ─── 4. SCROLL REVEAL ─────────────────────────────────────────────────────────
function initScrollReveal() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const card = entry.target;
      const idx = parseInt(card.dataset.idx, 10) || 0;
      setTimeout(() => {
        card.classList.add('revealed');
      }, idx * 80);
      observer.unobserve(card);
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.photo-card, .video-card').forEach(el => {
    el.classList.add('reveal-ready');
    observer.observe(el);
  });
}

// ─── 5. LIGHTBOX ──────────────────────────────────────────────────────────────
;(() => {
  const lb    = document.getElementById('lightbox');
  const inner = document.getElementById('lbInner');
  const closeBtn = document.getElementById('lbClose');
  if (!lb || !inner || !closeBtn) return;

  function open(card) {
    inner.innerHTML = '';
    if (card.dataset.type === 'photo') {
      const img = document.createElement('img');
      img.src = card.dataset.src;
      inner.appendChild(img);
    } else {
      const vid = document.createElement('video');
      vid.src = card.dataset.src;
      vid.controls = true;
      vid.preload = 'metadata';
      vid.playsInline = true;
      inner.appendChild(vid);
    }
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(() => {
      const v = inner.querySelector('video');
      if (v) v.pause();
      inner.innerHTML = '';
    }, 500);
  }

  document.addEventListener('click', e => {
    const card = e.target.closest('[data-type]');
    if (card) open(card);
  });

  lb.addEventListener('click', e => { if (e.target === lb) close(); });
  closeBtn.addEventListener('click', close);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
})();

// ─── 6. DOWNLOAD ──────────────────────────────────────────────────────────────
function downloadAll(type) {
  const items = type === 'all' ? MEDIA_DATA : MEDIA_DATA.filter(m => m.type === type);
  items.forEach((item, i) => {
    setTimeout(() => {
      const a = document.createElement('a');
      a.href = item.src;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      a.remove();
    }, i * 200);
  });
}

// ─── 7. INIT ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderGallery();
  initScrollReveal();
});
