<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejaul &amp; Afia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
:root {
  --ivory: #faf6ee;
  --parchment: #f5ede0;
  --gold: #b8913a;
  --gold-light: rgba(184,145,58,0.15);
  --gold-mid: rgba(184,145,58,0.4);
  --ink: #1c140a;
  --ink-light: rgba(28,20,10,0.6);
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-ui: 'Inter', system-ui, sans-serif;
  --ease: cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--ivory);
  color: var(--ink);
  font-family: var(--font-ui);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
img, video { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }

.gold-divider {
  display: flex; align-items: center; justify-content: center;
  gap: 1rem; margin: 2.5rem auto; max-width: 400px;
}
.gold-divider svg { flex: 1; overflow: visible; }
.gold-divider__diamond {
  width: 8px; height: 8px; background: var(--gold);
  transform: rotate(45deg); flex-shrink: 0;
}

.fade-up {
  opacity: 0; transform: translateY(28px);
  transition: opacity 0.85s var(--ease), transform 0.85s var(--ease);
}
.fade-up.visible { opacity: 1; transform: translateY(0); }

.gold-line {
  stroke-dasharray: 200; stroke-dashoffset: 200;
  transition: stroke-dashoffset 1.1s var(--ease);
}
.gold-line.drawn { stroke-dashoffset: 0; }

.btn {
  font-family: var(--font-ui); font-size: 0.72rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  padding: 0.9rem 2rem; cursor: pointer; border-radius: 0;
  transition: all 0.3s var(--ease); display: inline-block;
}
.btn--outline {
  border: 1px solid var(--gold); color: var(--gold); background: transparent;
}
.btn--outline:hover { background: var(--gold); color: var(--ivory); }
.btn--filled {
  background: var(--gold); color: var(--ivory); border: 1px solid var(--gold);
}
.btn--filled:hover { background: transparent; color: var(--gold); }

/* HERO */
#hero {
  position: relative; width: 100%; height: 100vh; min-height: 600px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; background: var(--ivory);
}
.hero-media-bg { position: absolute; inset: 0; z-index: 0; }
.hero-media-bg img, .hero-media-bg video {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; transition: opacity 1.4s ease;
}
.hero-overlay {
  position: absolute; inset: 0;
  background: rgba(250,246,238,0.65); z-index: 1;
}
.hero-arch {
  position: absolute; width: min(72vh,560px); height: auto;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  z-index: 2; pointer-events: none;
}
.hero-corner {
  position: absolute; width: 80px; height: 80px;
  z-index: 3; pointer-events: none;
}
.hero-corner--tl { top: 1.5rem; left: 1.5rem; }
.hero-corner--tr { top: 1.5rem; right: 1.5rem; }
.hero-corner--bl { bottom: 1.5rem; left: 1.5rem; }
.hero-corner--br { bottom: 1.5rem; right: 1.5rem; }
#particles { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
.hero-content {
  position: relative; z-index: 4; text-align: center;
  padding: 2rem; will-change: transform;
}
.hero-glow {
  position: absolute; top: 50%; left: 50%; width: 700px; height: 500px;
  transform: translate(-50%,-50%);
  background: radial-gradient(ellipse, rgba(184,145,58,0.1) 0%, transparent 65%);
  pointer-events: none;
}
.hero-title {
  font-family: var(--font-display); font-weight: 300;
  font-size: clamp(3.5rem,10vw,8rem); line-height: 1;
  letter-spacing: 0.04em; color: var(--ink);
  display: flex; align-items: baseline; justify-content: center;
  gap: 0.3em; flex-wrap: wrap;
}
.hero-amp { font-style: italic; color: var(--gold); font-size: 1.1em; line-height: 1; }
.hero-date {
  font-family: var(--font-ui); font-size: 0.72rem;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--ink-light); margin-top: 1.75rem;
}
.hero-ctas {
  display: flex; gap: 1rem; justify-content: center;
  margin-top: 2.5rem; flex-wrap: wrap;
}
.hero-anim {
  opacity: 0; transform: translateY(22px);
  animation: heroIn 1s var(--ease) var(--d,0s) forwards;
}
@keyframes heroIn { to { opacity: 1; transform: translateY(0); } }

/* NAV */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 2.5rem;
  background: rgba(250,246,238,0.82);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(184,145,58,0.14);
  transform: translateY(-100%); transition: transform 0.5s var(--ease);
}
.nav.visible { transform: translateY(0); }
.nav-logo {
  font-family: var(--font-display); font-style: italic;
  font-size: 1.4rem; letter-spacing: 0.06em; color: var(--ink);
}
.nav-links { list-style: none; display: flex; gap: 2.5rem; }
.nav-links a {
  font-family: var(--font-ui); font-size: 0.68rem;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-light); transition: color 0.3s;
}
.nav-links a:hover { color: var(--gold); }

/* GALLERY */
#gallery { background: var(--ivory); padding: 5rem 0; }
.creator-block { max-width: 1200px; margin: 0 auto; padding: 0 2rem 5rem; }
.creator-heading {
  font-family: var(--font-display); font-style: italic; font-weight: 400;
  font-size: clamp(1.8rem,4vw,3rem); color: var(--ink);
  text-align: center; letter-spacing: 0.04em; margin-bottom: 0.25rem;
}
.media-label {
  font-family: var(--font-ui); font-size: 0.62rem;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--gold); text-align: center; margin: 2.75rem 0 1.25rem;
}

/* PARALLAX INTERLUDES */
.parallax-interlude {
  height: 65vh; background-attachment: fixed;
  background-size: cover; background-position: center; position: relative;
}
.parallax-interlude::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(250,246,238,0.32);
}
/* PHOTO GRID */
.photo-grid { column-count: 3; column-gap: 0.875rem; }
.photo-card {
  break-inside: avoid; position: relative; margin-bottom: 0.875rem;
  cursor: pointer; overflow: hidden; border-radius: 2px;
}
.photo-card img {
  width: 100%; height: auto; display: block; opacity: 0;
  transition: opacity 0.5s ease, transform 0.65s var(--ease);
}
.photo-card img.loaded { opacity: 1; }
.photo-card:hover img { transform: scale(1.04); }
.photo-card__overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(28,20,10,0.72) 0%, transparent 55%);
  opacity: 0; transition: opacity 0.4s var(--ease);
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 0.875rem 0.875rem 0.75rem;
}
.photo-card:hover .photo-card__overlay { opacity: 1; }
.photo-card__caption {
  font-family: var(--font-display); font-style: italic;
  font-size: 0.95rem; color: rgba(250,246,238,0.9);
  margin-bottom: 0.5rem; line-height: 1.3;
}
.card-download {
  align-self: flex-end; width: 34px; height: 34px; border-radius: 50%;
  background: rgba(184,145,58,0.88); border: none;
  display: flex; align-items: center; justify-content: center;
  color: white; cursor: pointer; transition: background 0.3s;
  text-decoration: none; flex-shrink: 0;
}
.card-download:hover { background: var(--gold); }
.card-download svg { width: 14px; height: 14px; }

/* VIDEO GRID */
.video-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 0.875rem; }
.video-card {
  position: relative; cursor: pointer; overflow: hidden;
  border-radius: 2px; aspect-ratio: 16/9; background: var(--parchment);
}
.video-card img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.65s var(--ease), opacity 0.5s ease; opacity: 0;
}
.video-card img.loaded { opacity: 1; }
.video-card:hover img { transform: scale(1.04); }
.video-card__overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(28,20,10,0.65) 0%, rgba(28,20,10,0.1) 100%);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.4s;
}
.video-card:hover .video-card__overlay {
  background: linear-gradient(to top, rgba(28,20,10,0.78) 0%, rgba(28,20,10,0.18) 100%);
}
.video-card__play {
  width: 60px; height: 60px; border-radius: 50%;
  background: rgba(250,246,238,0.9);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.4s var(--ease), background 0.3s;
}
.video-card:hover .video-card__play { transform: scale(1.14); background: white; }
.video-card__play svg { width: 22px; height: 22px; margin-left: 3px; fill: var(--ink); }
.video-card__caption {
  position: absolute; bottom: 0.75rem; left: 0.75rem; right: 3rem;
  font-family: var(--font-display); font-style: italic; font-size: 0.92rem;
  color: rgba(250,246,238,0.88); opacity: 0; transform: translateY(5px);
  transition: opacity 0.4s, transform 0.4s;
}
.video-card:hover .video-card__caption { opacity: 1; transform: translateY(0); }
.video-card__dl { position: absolute; bottom: 0.6rem; right: 0.65rem; opacity: 0; transition: opacity 0.4s; }
.video-card:hover .video-card__dl { opacity: 1; }

/* LIGHTBOX */
.lightbox {
  position: fixed; inset: 0; background: rgba(28,20,10,0.93);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.35s var(--ease);
}
.lightbox.open { opacity: 1; pointer-events: all; }
.lightbox__inner {
  transform: scale(0.87); opacity: 0;
  transition: transform 0.4s var(--ease), opacity 0.4s var(--ease);
}
.lightbox.open .lightbox__inner { transform: scale(1); opacity: 1; }
.lightbox__inner img {
  max-width: 95vw; max-height: 90vh; width: auto; height: auto;
  object-fit: contain; display: block; image-rendering: auto;
}
.lightbox__inner video {
  max-width: 95vw; max-height: 90vh; width: auto; height: auto;
  display: block; background: #000; image-rendering: auto;
}
.lightbox__close {
  position: absolute; top: 1.25rem; right: 1.5rem;
  background: none; border: none; color: rgba(250,246,238,0.6);
  font-size: 2.2rem; cursor: pointer; line-height: 1;
  transition: color 0.3s; z-index: 1001;
}
.lightbox__close:hover { color: var(--ivory); }

/* CURSOR GLOW */
#cursorGlow {
  position: fixed; width: 320px; height: 320px; border-radius: 50%;
  background: radial-gradient(circle, rgba(184,145,58,0.07) 0%, transparent 70%);
  pointer-events: none; transform: translate(-50%,-50%); z-index: 9999;
  transition: opacity 0.3s;
}
@media (hover: none) { #cursorGlow { display: none; } }

/* DOWNLOAD */
#download {
  position: relative; background: var(--ink);
  padding: 9rem 2rem; text-align: center; overflow: hidden;
}
.dl-glow {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 700px; height: 500px;
  background: radial-gradient(ellipse, rgba(184,145,58,0.13) 0%, transparent 68%);
  pointer-events: none;
}
.dl-heading {
  font-family: var(--font-display); font-weight: 300;
  font-size: clamp(2.5rem,6vw,5.5rem); line-height: 1.1;
  color: var(--ivory); margin-bottom: 1.25rem;
}
.dl-heading em { font-style: italic; color: var(--gold); }
.dl-sub {
  font-family: var(--font-ui); font-size: 0.82rem;
  letter-spacing: 0.12em; color: rgba(250,246,238,0.45);
  margin-bottom: 3.5rem;
}
.dl-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.btn--dl {
  font-family: var(--font-ui); font-size: 0.68rem;
  letter-spacing: 0.22em; text-transform: uppercase;
  padding: 0.9rem 2.5rem; border: 1px solid rgba(184,145,58,0.4);
  color: rgba(250,246,238,0.6); background: transparent;
  cursor: pointer; transition: all 0.3s var(--ease); border-radius: 0;
}
.btn--dl:hover { border-color: var(--gold); color: var(--gold); }
.btn--dl-hero { border-color: var(--gold); color: var(--gold); }
.btn--dl-hero:hover { background: var(--gold); color: var(--ink); }

/* FOOTER */
footer {
  background: var(--ink); border-top: 1px solid rgba(184,145,58,0.12);
  padding: 3rem 2rem; text-align: center;
}
.footer-names {
  font-family: var(--font-display); font-style: italic;
  font-size: 1.75rem; color: rgba(250,246,238,0.75); letter-spacing: 0.06em;
}
.footer-names em { color: var(--gold); }
.footer-date {
  font-family: var(--font-ui); font-size: 0.62rem;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: rgba(184,145,58,0.45); margin-top: 0.5rem;
}

/* RESPONSIVE */
@media (max-width: 900px) { .photo-grid { column-count: 2; } }
@media (max-width: 768px) {
  .parallax-interlude { background-attachment: scroll; }
  .hero-corner { width: 52px; height: 52px; }
  .hero-arch { width: 88vw; }
  .creator-block { padding: 0 1rem 3rem; }
  .nav { padding: 0.875rem 1.25rem; }
  .dl-btns { flex-direction: column; align-items: center; }
  .btn--dl { width: 220px; }
}
@media (max-width: 580px) { .video-grid { grid-template-columns: 1fr; } }
@media (max-width: 500px) { .photo-grid { column-count: 1; } }
@media (max-width: 480px) {
  .hero-ctas { flex-direction: column; align-items: center; }
  .btn { width: 200px; text-align: center; }
  .video-grid { grid-template-columns: 1fr; }
}
h1,h2,h3,.nav-logo,.footer-names { font-display: swap; }
  </style>
</head>

  { creator: 'fahim', type: 'video', src: 'https://www.w3schools.com/html/mov_bbb.mp4', thumbnail: 'https://picsum.photos/seed/fv02/800/450', caption: 'First dance' },
  { creator: 'fahim', type: 'video', src: 'https://www.w3schools.com/html/mov_bbb.mp4', thumbnail: 'https://picsum.photos/seed/fv03/800/450', caption: 'Speeches' },

// ─── 2. FILTER HELPERS ────────────────────────────────────────────────────────
const sahidPhotos = MEDIA_DATA.filter(m => m.creator === 'sahid' && m.type === 'photo');
const sahidVideos = MEDIA_DATA.filter(m => m.creator === 'sahid' && m.type === 'video');
const fahimPhotos = MEDIA_DATA.filter(m => m.creator === 'fahim' && m.type === 'photo');
const fahimVideos = MEDIA_DATA.filter(m => m.creator === 'fahim' && m.type === 'video');
const allPhotos   = MEDIA_DATA.filter(m => m.type === 'photo');
const allVideos   = MEDIA_DATA.filter(m => m.type === 'video');

// ─── 3. PARTICLES ─────────────────────────────────────────────────────────────
;(function() {
  const canvas = document.getElementById('particles');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, particles;

  function resize() {
    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }

  function make() {
    return {
      x: Math.random() * W,
      y: H + Math.random() * 60,
      r: Math.random() * 1.8 + 0.4,
      speed: Math.random() * 0.55 + 0.18,
      opacity: Math.random() * 0.45 + 0.08,
      drift: (Math.random() - 0.5) * 0.25
    };
  }

  function init() {
    resize();
    particles = Array.from({ length: 55 }, make);
    particles.forEach(p => { p.y = Math.random() * H; });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(184,145,58,' + p.opacity + ')';
      ctx.fill();
      p.y -= p.speed;
      p.x += p.drift;
      p.opacity -= 0.0007;
      if (p.y < -10 || p.opacity <= 0) Object.assign(p, make());
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  init();
  draw();
})();

// ─── 4. HERO SLIDESHOW ────────────────────────────────────────────────────────
;(function() {
  const container = document.getElementById('heroMediaBg');
  if (!MEDIA_DATA.length || !container) return;

  const heroItems = MEDIA_DATA.slice(0, 8);
  let current = 0;
  let currentEl = null;

  const kenBurns = [
    { start: 'scale(1.08) translate(2%, 1%)',   end: 'scale(1) translate(0%, 0%)' },
    { start: 'scale(1.06) translate(-2%, -1%)', end: 'scale(1) translate(0%, 0%)' },
    { start: 'scale(1.07) translate(1%, -2%)',  end: 'scale(1) translate(0%, 0%)' }
  ];

  function show() {
    var item = heroItems[current % heroItems.length];
    var el;
    if (item.type === 'video') {
      el = document.createElement('video');
      el.src = item.src;
      el.muted = el.loop = el.playsInline = true;
      el.style.cssText = 'opacity:0;transition:opacity 1.4s ease;';
      setTimeout(function() { el.style.opacity = '1'; el.play().catch(function(){}); }, 30);
    } else {
      el = document.createElement('img');
      el.src = item.src;
      el.alt = '';
      var kb = kenBurns[current % kenBurns.length];
      el.style.cssText = 'opacity:0;transform:' + kb.start + ';transition:opacity 1.4s ease,transform 6s ease;';
      setTimeout(function() { el.style.opacity = '1'; el.style.transform = kb.end; }, 30);
    }
    container.appendChild(el);
    if (currentEl) {
      var prev = currentEl;
      prev.style.opacity = '0';
      setTimeout(function() { prev.remove(); }, 1500);
    }
    currentEl = el;
    current++;
  }

  show();
  setInterval(show, 5000);
})();

// ─── 5. CURSOR GLOW ──────────────────────────────────────────────────────────
;(function() {
  var glow = document.getElementById('cursorGlow');
  if (!glow) return;
  document.addEventListener('mousemove', function(e) {
    glow.style.left = e.clientX + 'px';
    glow.style.top  = e.clientY + 'px';
  });
})();

// ─── 6. HERO PARALLAX ────────────────────────────────────────────────────────
;(function() {
  var content = document.getElementById('heroContent');
  var arch    = document.querySelector('.hero-arch');
  if (!content || !arch) return;
  window.addEventListener('scroll', function() {
    var y = window.scrollY;
    if (y > window.innerHeight) return;
    content.style.transform = 'translateY(' + (y * 0.28) + 'px)';
    arch.style.transform    = 'translate(-50%, calc(-50% + ' + (y * 0.14) + 'px))';
  }, { passive: true });
})();

// ─── 7. NAV ───────────────────────────────────────────────────────────────────
;(function() {
  var nav  = document.getElementById('nav');
  var hero = document.getElementById('hero');
  if (!nav || !hero) return;
  new IntersectionObserver(function(entries) {
    nav.classList.toggle('visible', !entries[0].isIntersecting);
  }, { threshold: 0.1 }).observe(hero);
})();

// ─── 8. GOLD DIVIDER ─────────────────────────────────────────────────────────
function goldDividerHTML() {
  return '<div class="gold-divider">' +
    '<svg height="1" viewBox="0 0 200 1"><line x1="0" y1="0.5" x2="200" y2="0.5" stroke="#b8913a" stroke-width="1" class="gold-line"/></svg>' +
    '<div class="gold-divider__diamond"></div>' +
    '<svg height="1" viewBox="0 0 200 1"><line x1="0" y1="0.5" x2="200" y2="0.5" stroke="#b8913a" stroke-width="1" class="gold-line"/></svg>' +
  '</div>';
}

// ─── 9. PHOTO CARD ────────────────────────────────────────────────────────────
function photoCardHTML(item, idx) {
  return '<div class="photo-card fade-up" style="--d:' + (idx * 0.055) + 's" data-src="' + item.src + '" data-type="photo">' +
    '<img src="' + item.thumbnail + '" alt="' + item.caption + '" loading="lazy" onload="this.classList.add(\'loaded\')">' +
    '<div class="photo-card__overlay">' +
      '<p class="photo-card__caption">' + item.caption + '</p>' +
      '<a href="' + item.src + '" download class="card-download" onclick="event.stopPropagation()" title="Download photo">' +
        '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v8M5 7l3 3 3-3M2 12v2h12v-2"/></svg>' +
      '</a>' +
    '</div>' +
  '</div>';
}

// ─── 10. VIDEO CARD ───────────────────────────────────────────────────────────
function videoCardHTML(item, idx) {
  return '<div class="video-card fade-up" style="--d:' + (idx * 0.055) + 's" data-src="' + item.src + '" data-type="video">' +
    '<img src="' + item.thumbnail + '" alt="' + item.caption + '" loading="lazy" onload="this.classList.add(\'loaded\')">' +
    '<div class="video-card__overlay">' +
      '<div class="video-card__play">' +
        '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>' +
      '</div>' +
    '</div>' +
    '<p class="video-card__caption">' + item.caption + '</p>' +
    '<a href="' + item.src + '" download class="card-download video-card__dl" onclick="event.stopPropagation()" title="Download video">' +
      '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v8M5 7l3 3 3-3M2 12v2h12v-2"/></svg>' +
    '</a>' +
  '</div>';
}

// ─── 11. RENDER GALLERY ──────────────────────────────────────────────────────
function renderGallery() {
  var container = document.getElementById('galleryContent');
  if (!container) return;
  var creators = [
    { label: 'Sahid',  photos: sahidPhotos, videos: sahidVideos },
    { label: 'Fahim',  photos: fahimPhotos, videos: fahimVideos }
  ];
  var html = '';
  creators.forEach(function(c, i) {
    html += '<div class="creator-block fade-up">';
    html += '<h2 class="creator-heading">' + c.label + '</h2>';
    html += goldDividerHTML();
    if (c.photos.length) {
      html += '<p class="media-label">Photos</p>';
      html += '<div class="photo-grid">' + c.photos.map(photoCardHTML).join('') + '</div>';
    }
    if (c.videos.length) {
      html += '<p class="media-label">Videos</p>';
      html += '<div class="video-grid">' + c.videos.map(videoCardHTML).join('') + '</div>';
    }
    html += '</div>';
    if (i === 0) {
      html += '<div style="max-width:1200px;margin:0 auto;padding:0 2rem">' + goldDividerHTML() + '</div>';
    }
  });
  container.innerHTML = html;
}

// ─── 12. INTERLUDES ──────────────────────────────────────────────────────────
function initInterludes() {
  var i1 = document.getElementById('interlude1');
  var i2 = document.getElementById('interlude2');
  if (i1 && allPhotos[2]) i1.style.backgroundImage = 'url(' + allPhotos[2].src + ')';
  if (i2 && allPhotos[5]) i2.style.backgroundImage = 'url(' + allPhotos[5].src + ')';
}

// ─── 13. LIGHTBOX ─────────────────────────────────────────────────────────────
;(function() {
  var lb    = document.getElementById('lightbox');
  var inner = document.getElementById('lbInner');
  var closeB = document.getElementById('lbClose');
  if (!lb || !inner || !closeB) return;

  function open(card) {
    inner.innerHTML = '';
    if (card.dataset.type === 'photo') {
      var img = document.createElement('img');
      img.src = card.dataset.src;
      img.alt = '';
      inner.appendChild(img);
    } else {
      var vid = document.createElement('video');
      vid.src = card.dataset.src;
      vid.controls = true;
      vid.preload = 'metadata';
      vid.playsInline = true;
      inner.appendChild(vid);
    }
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(function() {
      var v = inner.querySelector('video');
      if (v) v.pause();
      inner.innerHTML = '';
    }, 400);
  }

  document.addEventListener('click', function(e) {
    var card = e.target.closest('[data-type]');
    if (!card) return;
    if (e.target.closest('.card-download')) return;
    open(card);
  });

  lb.addEventListener('click', function(e) { if (e.target === lb) close(); });
  closeB.addEventListener('click', close);
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') close(); });
})();

// ─── 14. SCROLL OBSERVERS ────────────────────────────────────────────────────
function observeScrollTargets() {
  var fadeObs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (!e.isIntersecting) return;
      var delay = parseFloat(getComputedStyle(e.target).getPropertyValue('--d') || 0) * 1000;
      setTimeout(function() { e.target.classList.add('visible'); }, delay);
      fadeObs.unobserve(e.target);
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });

  var lineObs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (!e.isIntersecting) return;
      e.target.classList.add('drawn');
      lineObs.unobserve(e.target);
    });
  }, { threshold: 0.6 });

  document.querySelectorAll('.fade-up').forEach(function(el) { fadeObs.observe(el); });
  document.querySelectorAll('.gold-line').forEach(function(el) { lineObs.observe(el); });
}

// ─── 15. DOWNLOAD ALL ─────────────────────────────────────────────────────────
function downloadAll(type) {
  var items = type === 'all' ? MEDIA_DATA : MEDIA_DATA.filter(function(m) { return m.type === type; });
  items.forEach(function(item, i) {
    setTimeout(function() {
      var a = document.createElement('a');
      a.href = item.src;
      a.download = item.caption.replace(/\s+/g, '-').toLowerCase() + '-' + (i + 1);
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }, i * 180);
  });
}

// ─── 16. INIT ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  renderGallery();
  initInterludes();
  observeScrollTargets();
});
</script>
