<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejaul &amp; Afia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sakura-js@1.1.1/dist/sakura.min.css">
  <style>

    /* ═══════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════ */
    :root {
      --ivory:     #faf6ee;
      --parchment: #f4ead8;
      --gold:      #b8913a;
      --gold-08:   rgba(184,145,58,0.08);
      --gold-20:   rgba(184,145,58,0.20);
      --gold-40:   rgba(184,145,58,0.40);
      --gold-60:   rgba(184,145,58,0.60);
      --ink:       #1c140a;
      --ink-30:    rgba(28,20,10,0.30);
      --ink-15:    rgba(28,20,10,0.15);
      --serif:     'Cormorant Garamond', Georgia, serif;
      --sans:      'Inter', system-ui, sans-serif;
      /* Easing */
      --ease-film: cubic-bezier(0.16, 1, 0.30, 1);   /* cinematic entrance */
      --ease-soft: cubic-bezier(0.45, 0, 0.55, 1);   /* state transitions  */
      --ease-snap: cubic-bezier(0.22, 1, 0.36, 1);   /* nav, overlays      */
      --ease-kb:   cubic-bezier(0.05, 0, 0.15, 1);   /* Ken Burns — slow glide */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--ivory);
      color: var(--ink);
      font-family: var(--sans);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }


    img, video { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }
    ::selection { background: var(--gold-08); }


    /* ═══════════════════════════════════════════════
       SCROLL REVEAL — pure fade+lift, no scale
    ═══════════════════════════════════════════════ */
    .reveal {
      opacity: 0;
      transform: translateY(10px);
      transition:
        opacity   0.82s var(--ease-film),
        transform 0.82s var(--ease-film);
      transition-delay: var(--delay, 0ms);
    }
    .reveal.in {
      opacity: 1;
      transform: none;
    }



    /* ═══════════════════════════════════════════════
       ORNAMENT DIVIDER — lines grow outward from diamond
    ═══════════════════════════════════════════════ */
    .orn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.875rem;
      margin: 2.5rem auto;
      max-width: 340px;
      padding: 0 2rem;
    }
    .orn__tick {
      width: 1px; height: 10px;
      background: var(--gold);
      opacity: 0;
      flex-shrink: 0;
      transition: opacity 0.5s var(--ease-film) 1s;
    }
    .orn.in .orn__tick { opacity: 0.28; }

    .orn__line {
      flex: 1; height: 1px;
      background: linear-gradient(to left, transparent, var(--gold));
      opacity: 0;
      transform: scaleX(0);
      transform-origin: right center;
      transition: opacity 0.9s var(--ease-soft), transform 1s var(--ease-soft);
    }
    .orn__line.right {
      background: linear-gradient(to right, transparent, var(--gold));
      transform-origin: left center;
    }
    .orn.in .orn__line { opacity: 0.42; transform: scaleX(1); }

    .orn__gem {
      width: 6px; height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
      opacity: 0.65;
    }


    /* ═══════════════════════════════════════════════
       NAV
    ═══════════════════════════════════════════════ */
    #nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 2.5rem;
      background: rgba(250,246,238,0.90);
      backdrop-filter: blur(22px) saturate(1.5);
      -webkit-backdrop-filter: blur(22px) saturate(1.5);
      border-bottom: 1px solid rgba(184,145,58,0.10);
      transform: translateY(-110%);
      transition: transform 0.65s var(--ease-snap);
    }
    #nav.show { transform: translateY(0); }

    .nav-logo {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.3rem;
      letter-spacing: 0.06em;
      color: var(--ink);
      user-select: none;
    }
    .nav-logo em { color: var(--gold); }

    .nav-links { list-style: none; display: flex; gap: 2.25rem; }
    .nav-links a {
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink-30);
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--gold); }


    /* ═══════════════════════════════════════════════
       HERO
    ═══════════════════════════════════════════════ */
    #hero {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 580px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--parchment);
    }

    #hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    #hero-bg img,
    #hero-bg video {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      will-change: opacity, transform;
    }

    .hero-veil {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        160deg,
        rgba(244,234,216,0.55) 0%,
        rgba(250,246,238,0.40) 48%,
        rgba(244,234,216,0.68) 100%
      );
    }

    .hero-arch {
      position: absolute;
      width: min(64vh, 460px);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      pointer-events: none;
      will-change: transform;
    }

    .crn {
      position: absolute;
      z-index: 3;
      pointer-events: none;
      width: 66px; height: 66px;
    }
    .crn.tl { top: 1.5rem; left: 1.5rem; }
    .crn.tr { top: 1.5rem; right: 1.5rem; }
    .crn.bl { bottom: 1.5rem; left: 1.5rem; }
    .crn.br { bottom: 1.5rem; right: 1.5rem; }

    #hero-text {
      position: relative;
      z-index: 4;
      text-align: center;
      padding: 2rem;
      will-change: transform;
    }
    .hero-glow {
      position: absolute;
      top: 50%; left: 50%;
      width: 680px; height: 460px;
      transform: translate(-50%, -50%);
      background: radial-gradient(ellipse,
        rgba(184,145,58,0.06) 0%,
        transparent 58%);
      pointer-events: none;
    }

    .hero-title {
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(4.2rem, 12vw, 9.5rem);
      line-height: 0.92;
      letter-spacing: 0.01em;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.04em;
    }
    .hero-amp {
      font-style: italic;
      color: var(--gold);
      font-size: 0.54em;
      line-height: 1;
    }
    .hero-date {
      font-size: 0.63rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--ink-30);
      margin-top: 2.25rem;
    }
    .hero-ctas {
      display: flex;
      gap: 0.875rem;
      justify-content: center;
      margin-top: 2.75rem;
      flex-wrap: wrap;
    }

    .btn {
      font-size: 0.63rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.9rem 2.1rem;
      cursor: pointer;
      border-radius: 0;
      transition:
        background 0.4s var(--ease-soft),
        color      0.4s var(--ease-soft),
        border-color 0.4s var(--ease-soft);
      display: inline-flex;
      align-items: center;
    }
    .btn-outline {
      border: 1px solid var(--ink-15);
      color: var(--ink);
      background: transparent;
    }
    .btn-outline:hover { background: var(--ink); color: var(--ivory); border-color: var(--ink); }
    .btn-gold {
      border: 1px solid var(--gold-40);
      color: var(--gold);
      background: transparent;
    }
    .btn-gold:hover { background: var(--gold); color: var(--ivory); border-color: var(--gold); }

    /* Staggered hero entrance */
    .h-in {
      opacity: 0;
      transform: translateY(14px);
      will-change: opacity, transform;
      animation: hup 1.1s var(--ease-film) var(--d, 0s) forwards;
    }
    @keyframes hup { to { opacity: 1; transform: none; } }

    /* Scroll cue */
    .hero-scroll {
      position: absolute;
      bottom: 2.25rem; left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .scroll-label {
      font-size: 0.51rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ink-30);
      opacity: 0;
      animation: hup 0.8s var(--ease-film) 2.2s forwards;
    }
    .scroll-line {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--gold-60), transparent);
      opacity: 0;
      transform-origin: top;
      animation: hup 0.8s var(--ease-film) 2.4s forwards, pulse 2.4s ease 3.2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.36; transform: scaleY(1); }
      50%      { opacity: 0.68; transform: scaleY(0.45); }
    }


    /* ═══════════════════════════════════════════════
       PARALLAX INTERLUDE
    ═══════════════════════════════════════════════ */
    .interlude {
      position: relative;
      height: 60vh;
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }
    .interlude::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(250,246,238,0.50) 0%,
        rgba(244,234,216,0.18) 40%,
        rgba(244,234,216,0.18) 60%,
        rgba(250,246,238,0.50) 100%
      );
    }
    /* Thin gold rule at top + bottom edges */
    .interlude::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      box-shadow: inset 0 1px 0 rgba(184,145,58,0.18),
                  inset 0 -1px 0 rgba(184,145,58,0.18);
      pointer-events: none;
    }
    @media (max-width: 768px) {
      .interlude { background-attachment: scroll; height: 48vw; min-height: 240px; }
    }


    /* ═══════════════════════════════════════════════
       GALLERY
    ═══════════════════════════════════════════════ */
    #gallery {
      background: linear-gradient(
        to bottom,
        var(--ivory) 0%,
        #f7edd9 35%,
        #faf3e7 65%,
        var(--ivory) 100%
      );
      padding: 8rem 0 3rem;
    }

    .creator-block {
      max-width: 1300px;
      margin: 0 auto 5rem;
      padding: 0 2.5rem;
    }

    .creator-eyebrow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      margin-bottom: 0.7rem;
    }
    .creator-eyebrow span {
      width: 26px; height: 1px;
      background: var(--gold);
      opacity: 0.32;
    }
    .creator-eyebrow i {
      width: 5px; height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.52;
    }

    .creator-name {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(2rem, 4.5vw, 3.2rem);
      color: var(--ink);
      text-align: center;
      letter-spacing: 0.05em;
    }

    .media-label {
      font-size: 0.56rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin: 3.25rem 0 1.25rem;
      opacity: 0.65;
    }

    /* ── Photo masonry ── */
    .photo-grid {
      column-count: 3;
      column-gap: 8px;
    }
    @media (max-width: 860px) { .photo-grid { column-count: 2; } }
    @media (max-width: 480px) { .photo-grid { column-count: 1; } }

    .photo-card {
      break-inside: avoid;
      position: relative;
      overflow: hidden;
      margin-bottom: 8px;
      cursor: pointer;
      background: var(--parchment);
      border-radius: 1px;
    }
    /* Subtle film-print inner border */
    .photo-card::after {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1px solid rgba(255,255,255,0.10);
      pointer-events: none;
      z-index: 3;
    }
    .photo-card img {
      width: 100%;
      height: auto;
      display: block;
      opacity: 0;
      transition:
        opacity   0.6s ease,
        transform 0.4s ease;
    }
    .photo-card img.loaded { opacity: 1; }
    .photo-card:hover img.loaded { transform: scale(1.028); }

    .pc-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(28,20,10,0.72) 0%,
        rgba(28,20,10,0.08) 48%,
        transparent 68%
      );
      opacity: 0;
      transition: opacity 0.5s var(--ease-soft);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0.9rem;
      z-index: 2;
    }
    .photo-card:hover .pc-overlay { opacity: 1; }

    /* ── Video grid ── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    @media (max-width: 560px) { .video-grid { grid-template-columns: 1fr; } }

    .video-card {
      position: relative;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      cursor: pointer;
      background: var(--parchment);
      border-radius: 1px;
    }
    .video-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition:
        opacity   0.6s ease,
        transform 0.9s var(--ease-film);
    }
    .video-card img.loaded { opacity: 1; }
    .video-card:hover img.loaded { transform: scale(1.028); }

    .vc-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(28,20,10,0.55) 0%,
        rgba(28,20,10,0.04) 100%
      );
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.5s var(--ease-soft);
      z-index: 2;
    }
    .video-card:hover .vc-overlay {
      background: linear-gradient(
        to top,
        rgba(28,20,10,0.74) 0%,
        rgba(28,20,10,0.16) 100%
      );
    }

    /* Shared card elements */
    .card-caption {
      font-family: var(--serif);
      font-style: italic;
      font-size: 0.9rem;
      color: rgba(250,246,238,0.92);
      margin-bottom: 0.45rem;
      line-height: 1.35;
    }
    .card-dl {
      align-self: flex-end;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(184,145,58,0.80);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      flex-shrink: 0;
      transition: background 0.3s, transform 0.35s var(--ease-film);
    }
    .card-dl:hover { background: var(--gold); transform: scale(1.12); }
    .card-dl svg { width: 12px; height: 12px; }

    .play-btn {
      width: 54px; height: 54px;
      border-radius: 50%;
      background: rgba(250,246,238,0.90);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.5s var(--ease-film), background 0.3s;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    }
    .video-card:hover .play-btn { transform: scale(1.1); background: #fff; }
    .play-btn svg { width: 18px; height: 18px; margin-left: 3px; fill: var(--ink); }

    .vc-caption {
      position: absolute;
      bottom: 0.75rem; left: 0.9rem; right: 3rem;
      font-family: var(--serif);
      font-style: italic;
      font-size: 0.88rem;
      color: rgba(250,246,238,0.9);
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.4s var(--ease-film), transform 0.4s var(--ease-film);
      z-index: 3;
    }
    .video-card:hover .vc-caption { opacity: 1; transform: none; }

    .vc-dl {
      position: absolute;
      bottom: 0.55rem; right: 0.55rem;
      opacity: 0;
      transition: opacity 0.4s var(--ease-film);
      z-index: 3;
    }
    .video-card:hover .vc-dl { opacity: 1; }


    /* ═══════════════════════════════════════════════
       LIGHTBOX
    ═══════════════════════════════════════════════ */
    #lb {
      position: fixed;
      inset: 0;
      background: rgba(18,10,5,0.96);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s var(--ease-soft);
    }
    #lb.open { opacity: 1; pointer-events: all; }

    #lb-in {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.55s var(--ease-film), transform 0.55s var(--ease-film);
    }
    #lb.open #lb-in { opacity: 1; transform: none; }

    #lb-in img {
      max-width: 94vw; max-height: 88vh;
      width: auto; height: auto;
      object-fit: contain; display: block;
    }
    #lb-in video {
      max-width: 94vw; max-height: 88vh;
      width: auto; height: auto;
      background: #000; display: block;
    }
    #lb-x {
      position: absolute;
      top: 1.5rem; right: 1.75rem;
      background: none; border: none;
      color: rgba(250,246,238,0.36);
      font-size: 1.8rem; line-height: 1;
      cursor: pointer;
      transition: color 0.28s;
      z-index: 1001;
    }
    #lb-x:hover { color: rgba(250,246,238,0.88); }


    /* ═══════════════════════════════════════════════
       DOWNLOAD
    ═══════════════════════════════════════════════ */
    #download {
      position: relative;
      padding: 7rem 2rem;
      text-align: center;
      overflow: hidden;
      background: var(--ivory);
    }
    #download::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 800px; height: 600px;
      transform: translate(-50%, -50%);
      background: radial-gradient(ellipse, rgba(184,145,58,0.04) 0%, transparent 65%);
      pointer-events: none;
    }
    .dl-glow {
      position: absolute;
      top: 50%; left: 50%;
      width: 900px; height: 680px;
      transform: translate(-50%, -50%);
      background: radial-gradient(ellipse,
        rgba(184,145,58,0.12) 0%,
        rgba(184,145,58,0.03) 42%,
        transparent 65%);
      pointer-events: none;
    }
    .dl-heading {
      position: relative;
      font-family: var(--serif);
      font-weight: 300;
      font-size: clamp(1.9rem, 4.5vw, 3.6rem);
      line-height: 1.32;
      color: var(--ink);
      letter-spacing: 0.02em;
      margin-bottom: 3rem;
    }
    .dl-heading em { font-style: italic; color: var(--gold); }

    .dl-btns {
      position: relative;
      display: flex;
      gap: 0.875rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-dl {
      font-size: 0.62rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      padding: 0.9rem 2.5rem;
      border: 1px solid var(--gold-40);
      color: var(--ink-30);
      background: transparent;
      cursor: pointer;
      border-radius: 0;
      transition:
        border-color 0.38s var(--ease-soft),
        color        0.38s var(--ease-soft),
        background   0.38s var(--ease-soft);
    }
    .btn-dl:hover { border-color: var(--gold); color: var(--gold); }
    .btn-dl-primary { border-color: var(--gold); color: var(--gold); }
    .btn-dl-primary:hover { background: var(--gold); color: var(--ivory); border-color: var(--gold); }


    /* ═══════════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════════ */
    footer {
      background: var(--ivory);
      border-top: 1px solid var(--gold-08);
      padding: 3.5rem 2rem;
      text-align: center;
    }
    .footer-names {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: 1.65rem;
      color: var(--ink-30);
      letter-spacing: 0.07em;
    }
    .footer-names em { color: var(--gold); }
    .footer-date {
      font-size: 0.56rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold-40);
      margin-top: 0.55rem;
    }



    /* ═══════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════ */
    @media (max-width: 768px) {
      #nav         { padding: 0.85rem 1.25rem; }
      .nav-links   { gap: 1.75rem; }
      .crn         { width: 44px; height: 44px; }
      .hero-arch   { width: 88vw; }
      .hero-title  { font-size: clamp(3.2rem, 13vw, 5.5rem); }
      .creator-block { padding: 0 1rem; margin-bottom: 3rem; }
      .photo-grid  { column-count: 2; column-gap: 6px; }
      .photo-card  { margin-bottom: 6px; }
      .video-grid  { gap: 6px; }
      #gallery     { padding: 4rem 0 2rem; }
      #download    { padding: 4rem 1.5rem; }
      .dl-btns     { flex-direction: column; align-items: center; gap: 0.75rem; }

  // ─── NAV ──────────────────────────────────────────────────────────────
  new IntersectionObserver(
    ([e]) => document.getElementById('nav').classList.toggle('show', !e.isIntersecting),
    { threshold: 0.12 }
  ).observe(document.getElementById('hero'))


  // ─── HERO SLIDESHOW — cinematic Ken Burns ─────────────────────────────
  ;(function() {
    const wrap = document.getElementById('hero-bg')
    const srcs = [
      'hero.jpg',
      'hero-DSCF2707.jpg',
      'hero-DSCF2741.jpg',
      'hero-DSCF2910.jpg',
      'hero-DSCF3430.jpg',
    ]
    // Gentle, varied Ken Burns moves
    const moves = [
      { from:'scale(1.06) translate(1.2%, 0.6%)',  to:'scale(1.0) translate(0%, 0%)' },
      { from:'scale(1.06) translate(-1.2%,-0.6%)', to:'scale(1.0) translate(0%, 0%)' },
      { from:'scale(1.07) translate(0.5%,-1.2%)',  to:'scale(1.0) translate(0%, 0%)' },
      { from:'scale(1.06) translate(-0.5%, 1.0%)', to:'scale(1.0) translate(0%, 0%)' },
    ]
    let idx = 0, cur = null

    function next() {
      const m  = moves[idx % moves.length]
      const el = document.createElement('img')
      el.src   = srcs[idx % srcs.length]
      el.alt   = ''
      // Start invisible + at Ken Burns origin
      el.style.cssText = `
        opacity: 0;
        transform: ${m.from};
        transition:
          opacity   1.4s ease,
          transform 10s cubic-bezier(0.05, 0, 0.12, 1);
      `
      wrap.appendChild(el)

      // Double rAF: guarantees transition fires after paint
      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.style.opacity   = '1'
        el.style.transform = m.to
      }))

      if (cur) {
        const prev = cur
        // Fade out old slide partway through
        setTimeout(() => {
          prev.style.transition = 'opacity 1.4s ease'
          prev.style.opacity    = '0'
          setTimeout(() => prev.remove(), 1500)
        }, 4400)
      }
      cur = el
      idx++
    }

    next()
    setInterval(next, 6000)
  })()


  // ─── HERO PARALLAX ────────────────────────────────────────────────────
  ;(function() {
    const txt  = document.getElementById('hero-text')
    const arch = document.querySelector('.hero-arch')
    let   ticking = false

    window.addEventListener('scroll', () => {
      if (ticking) return
      ticking = true
      requestAnimationFrame(() => {
        const y = window.scrollY
        if (y < window.innerHeight) {
          txt.style.transform  = `translateY(${y * 0.22}px)`
          arch.style.transform = `translate(-50%, calc(-50% + ${y * 0.10}px))`
        }
        ticking = false
      })
    }, { passive: true })
  })()





  // ─── GALLERY RENDER ───────────────────────────────────────────────────
  const dlSvg = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v8M5 7l3 3 3-3M2 12v2h12v-2"/></svg>`

  function ornHtml() {
    return `<div class="orn">
      <div class="orn__tick"></div>
      <div class="orn__line"></div>
      <div class="orn__gem"></div>
      <div class="orn__line right"></div>
      <div class="orn__tick"></div>
    </div>`
  }

  function photoCard(m, i) {
    // Cap stagger so the 10th+ card doesn't wait forever
    const delay = Math.min(i, 9) * 55
    return `<div class="photo-card reveal" style="--delay:${delay}ms"
         data-src="${m.src}" data-type="photo">
      <img src="${m.th}" alt="${m.cap}" loading="lazy" onload="this.classList.add('loaded')">
      <div class="pc-overlay">
        <p class="card-caption">${m.cap}</p>
        <a href="${m.src}" download class="card-dl"
           onclick="event.stopPropagation()" title="Download">${dlSvg}</a>
      </div>
    </div>`
  }

  function videoCard(m, i) {
    const delay = Math.min(i, 5) * 70
    return `<div class="video-card reveal" style="--delay:${delay}ms"
         data-src="${m.src}" data-type="video">
      <img src="${m.th}" alt="${m.cap}" loading="lazy" onload="this.classList.add('loaded')">
      <div class="vc-overlay">
        <div class="play-btn">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>

      </div>

      <a href="${m.src}" download class="card-dl vc-dl"
         onclick="event.stopPropagation()" title="Download">${dlSvg}</a>
    </div>`
  }

  function buildGallery() {
    const wrap    = document.getElementById('gc')
    const creators = [
      { label:'Sahid',  key:'sahid' },
      { label:'Advone', key:'advone' },
      { label:'Finn',   key:'finn'  },
      { label:'Fahim', key:'fahim' },
    ]
    wrap.innerHTML = creators.map((c, ci) => {
      const photos = MEDIA.filter(m => m.c === c.key && m.t === 'photo')
      const videos = MEDIA.filter(m => m.c === c.key && m.t === 'video')
      return `
        <div class="creator-block">
          <div class="creator-eyebrow"><span></span><i></i><span></span></div>
          <h2 class="creator-name">${c.label}</h2>
          ${ornHtml()}
          ${photos.length ? `<p class="media-label">Photos</p>
            <div class="photo-grid">${photos.map(photoCard).join('')}</div>
            <a href="${c.key}.html" class="view-all-link">View All Photos →</a>` : ''}
          ${videos.length ? `<p class="media-label">Videos</p>
            <div class="video-grid">${videos.map(videoCard).join('')}</div>` : ''}
        </div>
        ${ci < creators.length - 1
          ? `<div style="max-width:1300px;margin:0 auto;padding:0 2.5rem">${ornHtml()}</div>`
          : ''}
      `
    }).join('')
  }


  // ─── PARALLAX INTERLUDES ──────────────────────────────────────────────
  function buildInterludes() {
    document.getElementById('il1').style.backgroundImage = "url('hero-DSCF2910.jpg')"
    document.getElementById('il2').style.backgroundImage = "url('hero-DSCF3430.jpg')"
  }


  // ─── SCROLL REVEAL ────────────────────────────────────────────────────
  function initReveal() {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (!e.isIntersecting) return
        e.target.classList.add('in')
        // Add scale-in for photo cards
        if (e.target.classList.contains('photo-card')) e.target.classList.add('scale-in')
        obs.unobserve(e.target)
      })
    }, { threshold: 0.06, rootMargin: '0px 0px -20px 0px' })

    document.querySelectorAll('.reveal, .orn').forEach(el => obs.observe(el))
  }


  // ─── LIGHTBOX ─────────────────────────────────────────────────────────
  ;(function() {
    const lb  = document.getElementById('lb')
    const inn = document.getElementById('lb-in')
    const cls = document.getElementById('lb-x')

    function open(card) {
      inn.innerHTML = ''
      if (card.dataset.type === 'photo') {
        const img = document.createElement('img')
        img.src = card.dataset.src; img.alt = ''
        inn.appendChild(img)
      } else {
        const vid = document.createElement('video')
        vid.src = card.dataset.src
        vid.controls = vid.playsInline = true
        vid.preload  = 'metadata'
        inn.appendChild(vid)
      }
      lb.classList.add('open')
      document.body.style.overflow = 'hidden'
    }

    function close() {
      lb.classList.remove('open')
      document.body.style.overflow = ''
      setTimeout(() => {
        const v = inn.querySelector('video')
        if (v) v.pause()
        inn.innerHTML = ''
      }, 460)
    }

    document.addEventListener('click', e => {
      const card = e.target.closest('[data-type]')
      if (!card || e.target.closest('.card-dl')) return
      open(card)
    })
    lb.addEventListener('click',  e => { if (e.target === lb) close() })
    cls.addEventListener('click', close)
    document.addEventListener('keydown', e => { if (e.key === 'Escape') close() })
  })()


  // ─── DOWNLOAD ─────────────────────────────────────────────────────────
  function dlAll(type) {
    const items = type === 'all' ? MEDIA : MEDIA.filter(m => m.t === type)
    items.forEach((m, i) => setTimeout(() => {
      const a = Object.assign(document.createElement('a'), {
        href: m.src,
        download: m.cap.replace(/\s+/g, '-').toLowerCase(),
      })
      document.body.appendChild(a); a.click(); a.remove()
    }, i * 200))
  }


  // ─── INIT ─────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    buildGallery()
    buildInterludes()
    initReveal()
  })

  // ─── GSAP ANIMATIONS ────────────────────────────────────────────────────
  gsap.registerPlugin(ScrollTrigger)

  // Wait for gallery to render
  window.addEventListener('load', function() {

    // Batch reveal for all cards — more reliable than individual ScrollTriggers
    ScrollTrigger.batch('.photo-card, .video-card', {
      start: 'top 90%',
      onEnter: function(batch) {
        gsap.fromTo(batch, 
          { y: 30, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.7, stagger: 0.06, ease: 'power2.out', overwrite: true }
        )
      },
      once: true
    })

    // Creator blocks fade in
    ScrollTrigger.batch('.creator-block', {
      start: 'top 90%',
      onEnter: function(batch) {
        gsap.fromTo(batch,
          { y: 40, opacity: 0 },
          { y: 0, opacity: 1, duration: 1, ease: 'power3.out', overwrite: true }
        )
      },
      once: true
    })

    // Creator name text reveal — each letter animates in
    gsap.utils.toArray('.creator-name').forEach(function(el) {
      var text = el.textContent
      el.innerHTML = text.split('').map(function(ch) {
        return ch === ' ' ? ' ' : '<span style="display:inline-block">' + ch + '</span>'
      }).join('')
      ScrollTrigger.create({
        trigger: el,
        start: 'top 88%',
        once: true,
        onEnter: function() {
          gsap.fromTo(el.querySelectorAll('span'),
            { y: 25, opacity: 0, rotateX: -50 },
            { y: 0, opacity: 1, rotateX: 0, duration: 0.5, stagger: 0.04, ease: 'back.out(1.7)' }
          )
        }
      })
    })

    // Parallax on interlude images
    gsap.utils.toArray('.interlude').forEach(function(el) {
      gsap.to(el, {
        backgroundPositionY: '30%',
        ease: 'none',
        scrollTrigger: { trigger: el, start: 'top bottom', end: 'bottom top', scrub: true }
      })
    })

    // Download section reveal
    var dlBody = document.getElementById('dl-body')
    if (dlBody) {
      ScrollTrigger.create({
        trigger: dlBody,
        start: 'top 90%',
        once: true,
        onEnter: function() {
          gsap.fromTo(dlBody, { y: 40, opacity: 0 }, { y: 0, opacity: 1, duration: 1, ease: 'power3.out' })
        }
      })
    }

    // Desktop-only interactions (skip on touch devices)
    var isTouch = window.matchMedia('(hover: none)').matches

    if (!isTouch) {
      // Magnetic buttons
      document.querySelectorAll('.btn, .btn-outline, .btn-gold, .btn-dl').forEach(function(btn) {
        btn.addEventListener('mousemove', function(e) {
          var rect = btn.getBoundingClientRect()
          var x = e.clientX - rect.left - rect.width / 2
          var y = e.clientY - rect.top - rect.height / 2
          gsap.to(btn, { x: x * 0.3, y: y * 0.3, duration: 0.3, ease: 'power2.out' })
        })
        btn.addEventListener('mouseleave', function() {
          gsap.to(btn, { x: 0, y: 0, duration: 0.5, ease: 'elastic.out(1, 0.5)' })
        })
      })

      // Photo card 3D tilt
      document.querySelectorAll('.photo-card').forEach(function(card) {
        card.addEventListener('mousemove', function(e) {
          var rect = card.getBoundingClientRect()
          var x = (e.clientX - rect.left) / rect.width - 0.5
          var y = (e.clientY - rect.top) / rect.height - 0.5
          gsap.to(card, {
            rotateY: x * 15,
            rotateX: -y * 15,
            scale: 1.02,
            duration: 0.3,
            ease: 'power2.out',
            transformPerspective: 600
          })
        })
        card.addEventListener('mouseleave', function() {
          gsap.to(card, { rotateY: 0, rotateX: 0, scale: 1, duration: 0.5, ease: 'elastic.out(1, 0.6)' })
        })
      })
    }

  })

  // ─── SAKURA PETALS ──────────────────────────────────────────────────────
  var sakura = new Sakura('body', {
    colors: [
      { gradientColorStart: 'rgba(255,170,50,0.9)', gradientColorEnd: 'rgba(240,140,20,0.8)', gradientColorDegree: 120 },
      { gradientColorStart: 'rgba(255,190,180,0.85)', gradientColorEnd: 'rgba(240,150,165,0.7)', gradientColorDegree: 130 },
      { gradientColorStart: 'rgba(255,252,245,0.9)', gradientColorEnd: 'rgba(255,245,230,0.7)', gradientColorDegree: 110 },
      { gradientColorStart: 'rgba(120,175,80,0.8)', gradientColorEnd: 'rgba(90,145,50,0.6)', gradientColorDegree: 140 },
    ],
    maxSize: 18,
    minSize: 10,
    delay: 150,
    fallSpeed: 1,
  })

  </script>
</body>
</html>
